slurm:
  partition: campus-new
  time: "08:00:00"
  mem_gb: 32
  cpus_per_task: 4
  max_concurrent: 20  # max simultaneous array tasks (%N suffix in --array)
  conda_env: antigen
  log_dir: logs/slurm/  # relative to project_root; created automatically by SLURM
  # Absolute path to the antigen-forecasting repo on the cluster.
  # Update this to match your own cluster home directory before submitting jobs,
  # e.g. /fh/fast/matsen_e/<yourname>/antigen-forecasting
  project_root: /fh/fast/matsen_e/zthornto/antigen-forecasting
  python_bin: python  # override if conda activate does not put python on PATH
